services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 容器内通过服务名访问 Qdrant,覆盖 .env 里的 localhost
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy

  # 可选:本地 Embedding(HuggingFace TEI)。启用后在 .env 设置:
  #   EMBEDDING_PROVIDER=tei  TEI_URL=http://tei:80  EMBEDDING_DIM=1024
  # GPU 机器把镜像换成 ...:latest 并加 deploy.resources 预留 GPU;CPU 用 -cpu 镜像。
  # tei:
  #   image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
  #   restart: unless-stopped
  #   command: ["--model-id", "BAAI/bge-large-zh-v1.5"]
  #   ports:
  #     - "8080:80"
  #   volumes:
  #     - tei_data:/data

  # 可选:用 Redis Stack 替代 Qdrant 做向量库(含 RediSearch + RedisJSON)。
  # 启用后在 .env 设置:VECTOR_STORE=redis  REDIS_VECTOR_URL=redis://redis-stack:6379/0
  # redis-stack:
  #   image: redis/redis-stack-server:latest
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data

  # 可选:多实例部署时的会话记忆后端(与上面的向量库 Redis 可共用同一实例)
  # 将 .env 的 MEMORY_BACKEND 改为 redis
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"

volumes:
  qdrant_data:
  app_data:
  # tei_data:
  # redis_data:
