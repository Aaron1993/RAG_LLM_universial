services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 容器内通过服务名访问 Qdrant,覆盖 .env 里的 localhost
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy

  # 可选:多实例部署时启用,并将 .env 的 MEMORY_BACKEND 改为 redis
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"

volumes:
  qdrant_data:
  app_data:
